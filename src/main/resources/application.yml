spring:
  application:
    name: GraoMestre
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

    url: jdbc:${MYSQL_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  public:
    key: ${JWT_PUBLIC_KEY:classpath:certs/authz.pub}
  private:
    key: ${JWT_PRIVATE_KEY:classpath:certs/authz.pem}

image:
  upload:
    dir: ${IMAGE_UPLOAD_DIR:/tmp/images}
  base-path: /images/

app:
  base-url: ${APP_BASE_URL}

server:
  port: ${PORT:8081}

mercadopago:
  access:
    token: ${MP_ACCESS_TOKEN}